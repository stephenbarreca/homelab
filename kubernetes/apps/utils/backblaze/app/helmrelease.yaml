---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backblaze
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      backblaze:
#        pod:
#          securityContext:
#            runAsUser: 1000
#            runAsGroup: 1000
#            runAsNonRoot: true
#            fsGroup: 1000
#            fsGroupChangePolicy: "OnRootMismatch"

        containers:
          app:
            image:
              repository: tessypowder/backblaze-personal-wine
              tag: v2.0@sha256:7666700c8ce5066b562321046144d16d80d85883d874d6472e4f841d7f84f269
            env:
              TZ: America/New_York
              USER_ID: "0"
              GROUP_ID: "0"
              UMASK: "000"
              DISPLAY_WIDTH: "900"
              DISPLAY_HEIGHT: "900"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "/bin/bash"
                      - "-c"
                      - "ps -aux | grep bzbui.exe | grep -v grep"
                  periodSeconds: 10
                  failureThreshold: 6
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 200m
                memory: 6Gi
              limits:
                cpu: 2
                memory: 16Gi
#            securityContext:
#              allowPrivilegeEscalation: false
#              readOnlyRootFilesystem: false
#              capabilities:
#                drop:
#                  - ALL

    service:
      app:
        controller: backblaze
        ports:
          http:
            port: 5800

    ingress:
      app:
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: local
        className: traefik
        hosts:
          - host: backblaze.stephenbarre.ca
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    persistence:
      config:
        existingClaim: backblaze-config
        globalMounts:
          - path: /config/wine
      backup-movies:
        existingClaim: backup-movies
        globalMounts:
          - path: /drive_m
      backup-documents:
        existingClaim: backup-documents
        globalMounts:
          - path: /drive_d
      backup-tv:
        existingClaim: backup-tv
        globalMounts:
          - path: /drive_t
