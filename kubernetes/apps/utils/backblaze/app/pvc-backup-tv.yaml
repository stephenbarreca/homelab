kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: backup-tv
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: Immediate
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: backup-tv
spec:
  capacity:
    storage: 25Ti
  volumeMode: Filesystem
  accessModes:
  - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: backup-tv
  local:
    path: /data/network/media/tv
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - k8s
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-tv
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: backup-tv
  resources:
    requests:
      storage: 25Ti
